services:
  caddy:
    build:
      context: ./deploy/public
    restart: unless-stopped
    env_file:
      - ./deploy/public/.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/public/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      pocketbase:
        condition: service_healthy
      frontend:
        condition: service_started

  ddns-updater:
    image: ghcr.io/qdm12/ddns-updater:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./deploy/public/.env
    environment:
      LOG_LEVEL: info
      PERIOD: 5m
      PUBLICIP_FETCHERS: http
      PUBLICIPV4_HTTP_PROVIDERS: ipify
      PUBLICIPV6_HTTP_PROVIDERS: ipify
      TZ: Europe/Berlin
    volumes:
      - ./deploy/public/ddns-updater/data:/updater/data

volumes:
  caddy_data:
  caddy_config:
