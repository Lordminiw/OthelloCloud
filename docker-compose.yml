services:
  pocketbase:
    build:
      context: ./backend/pocketbase
      args:
        POCKETBASE_VERSION: 0.38.0
    ports:
      - "8090:8090"
    volumes:
      - ./backend/pocketbase/pb_data:/pb_data
      - ./backend/pocketbase/pb_migrations:/pb_migrations:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/api/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_POCKETBASE_URL: /
    depends_on:
      pocketbase:
        condition: service_healthy
    ports:
      - "8081:80"
    restart: unless-stopped
